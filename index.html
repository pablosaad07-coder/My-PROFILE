<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ᏢᎯᏰᏞᏫ | Profile</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }

        /* طبقة الفيديو الخلفية */
        .video-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: #000;
        }
        video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* التظليل */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.55); z-index: 2;
        }

        /* المحتوى */
        .wrapper {
            position: relative; z-index: 10; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
        }

        /* المربع (الكرطونة) اللي فيها التفاصيل */
        .card {
            background: rgba(10, 10, 10, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px; padding: 40px 20px;
            width: 90%; max-width: 320px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,1);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        }

        .profile-img { width: 95px; height: 95px; border-radius: 50%; border: 2px solid #fff; margin-bottom: 15px; object-fit: cover; }
        
        /* الاسم المتوهج */
        .glow-name { 
            color: #fff; font-size: 26px; letter-spacing: 5px; font-weight: bold; 
            text-shadow: 0 0 10px #fff, 0 0 20px rgba(255,255,255,0.5); 
            animation: neonPulse 2s infinite alternate; 
        }
        @keyframes neonPulse { 
            from { text-shadow: 0 0 10px #fff, 0 0 20px rgba(255,255,255,0.6); opacity: 1; } 
            to { text-shadow: 0 0 5px #fff, 0 0 10px rgba(255,255,255,0.3); opacity: 0.8; } 
        }

        .sub { color: #777; font-size: 10px; letter-spacing: 3px; margin-bottom: 30px; display: block; }

        /* روابط التواصل */
        .links a { display: flex; align-items: center; justify-content: center; background: rgba(255, 255, 255, 0.04); color: #fff; text-decoration: none; padding: 14px; margin: 12px 0; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.08); font-weight: bold; font-size: 14px; transition: 0.3s; }
        .links a img { width: 20px; margin-right: 12px; filter: brightness(2); }
        .links a:hover { background: #fff; color: #000; transform: translateY(-3px); }
    </style>
</head>
<body onclick="startAll()">

    <div class="video-container">
        <video autoplay muted loop playsinline id="bgVideo">
            <source src="https://g.top4top.io/m_37380n3vq1.mp4" type="video/mp4">
        </video>
    </div>

    <div class="overlay"></div>

    <audio id="bgMusic" loop><source src="https://k.top4top.io/m_37389748i0.mp3" type="audio/mp3"></audio>

    <div class="wrapper">
        <div class="card">
            <img src="https://f.top4top.io/p_37386gqbl0.png" class="profile-img">
            
            <h1 class="glow-name">ᏢᎯᏰᏞᏫ</h1>
            <span class="sub">DIGITAL CREATOR</span>
            
            <div class="links">
                <a href="https://www.instagram.com/s22_07s?igsh=MW1ibjR2bWZmaHZ4dA==" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/174/174855.png"> Instagram</a>
                <a href="https://www.tiktok.com/@rambo.studio22?_r=1&_t=ZS-952WXDdRePl" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" style="filter: invert(1);"> TikTok</a>
                <a href="https://discord.gg/fBGHusbxC8" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/3670/3670157.png"> Discord</a>
            </div>
            
            <p style="color: #444; font-size: 8px; margin-top: 20px;">TAP TO START 🎵</p>
        </div>
    </div>

    <script>
        function startAll() {
            document.getElementById('bgVideo').play(); 
            document.getElementById('bgMusic').play();
        }
    </script>
</body>
</html>
